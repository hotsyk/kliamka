name: Publish to PyPI

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] restricted to successful pushes on main below
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this version exists as a git tag
          if git tag --list | grep -q "^v$VERSION$"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already exists as a tag"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version $VERSION detected"
          fi

  build-distributions:
    needs: check-version
    runs-on: ubuntu-latest
    if: ${{ needs.check-version.outputs.version-changed == 'true' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install smoke test dependencies
        run: |
          uv venv --python 3.12
          uv pip install pytest

      - name: Build release distributions
        run: |
          rm -rf dist
          uv build --python .venv/bin/python

      - name: Smoke test release distributions
        env:
          KLIAMKA_PACKAGING_DIST: dist
        run: |
          source .venv/bin/activate
          pytest tests/test_packaging_smoke.py -v --tb=short -m packaging

      - name: Upload release distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  create-release:
    needs: [check-version, build-distributions]
    runs-on: ubuntu-latest
    if: ${{ needs.check-version.outputs.version-changed == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create Git tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags" \
            --method POST \
            -f tag="v${RELEASE_VERSION}" \
            -f message="Release v${RELEASE_VERSION}" \
            -f object="${RELEASE_SHA}" \
            -f type="commit" \
            --jq .sha)
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            -f ref="refs/tags/v${RELEASE_VERSION}" \
            -f sha="${TAG_SHA}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          files: dist/*

  publish:
    needs: [check-version, build-distributions, create-release]
    runs-on: ubuntu-latest
    if: ${{ needs.check-version.outputs.version-changed == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p/kliamka
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          print-hash: true
