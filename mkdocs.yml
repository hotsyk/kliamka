site_name: Kliamka
site_description: Type-safe Python command-line interfaces powered by Pydantic and argparse
site_url: https://hotsyk.github.io/kliamka/
repo_url: https://github.com/hotsyk/kliamka
repo_name: hotsyk/kliamka
edit_uri: edit/main/docs/
copyright: Copyright © Volodymyr Hotsyk

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Get started: 20260710_getting_started.md
  - User guide:
      - Arguments and types: 20260710_arguments_and_types.md
      - Environment variables: 20260710_environment_variables.md
      - Subcommands: 20260710_subcommands.md
      - Converters and validation: 20260710_converters_and_validation.md
      - Parser customization: 20260710_parser_customization.md
  - Reference:
      - Public API: 20260710_api_reference.md
      - Examples: 20260710_examples.md
      - Troubleshooting: 20260710_troubleshooting.md
  - Project:
      - Development and deployment: 20260710_development.md
      - Product requirements: 20260408_product_requirements.md
      - Development log: TODO.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
